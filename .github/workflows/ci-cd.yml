name: ci-cd-java-maven-github

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Testes unitários
        run: mvn -B -Dtest='*Test' test

      - name: Testes de integração
        run: mvn -B -Dtest='*IT' test

      - name: Testes funcionais
        run: mvn -B -Dtest='*FT' test

      - name: Build da aplicação
        run: mvn -B clean package -DskipTests

      - name: Subir aplicação para smoke e performance
        run: |
          nohup java -jar target/devops-pipeline-1.0.0.jar --server.port=8081 > app.log 2>&1 &
          echo $! > app.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/actuator/health > /dev/null; then
              echo "Aplicação disponível"
              exit 0
            fi
            sleep 2
          done
          echo "Aplicação não iniciou a tempo"
          cat app.log
          exit 1

      - name: Smoke tests
        run: ./scripts/smoke-test.sh http://localhost:8081

      - name: Configurar k6
        uses: grafana/setup-k6-action@v1

      - name: Testes de performance
        run: k6 run tests/performance/smoke-load.js -e BASE_URL=http://localhost:8081

      - name: Parar aplicação local
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi

      - name: Análise SonarQube
        if: ${{ secrets.SONAR_TOKEN != 'ede1f4d6c5f1233308ff9c74dcafbd0607b33b74' && secrets.SONAR_HOST_URL != 'https://sonarcloud.io' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=devops-pipeline \
            -Dsonar.projectName=devops-pipeline \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN}

      - name: Build da imagem Docker
        run: docker build -t devops-pipeline:latest .

      - name: Deploy acadêmico com Docker
        run: |
          docker rm -f devops-pipeline || true
          docker run -d --name devops-pipeline -p 8080:8080 devops-pipeline:latest
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
              echo "Deploy validado com sucesso"
              exit 0
            fi
            sleep 2
          done
          docker logs devops-pipeline
          exit 1

      - name: Smoke pós-deploy
        run: ./scripts/smoke-test.sh http://localhost:8080
