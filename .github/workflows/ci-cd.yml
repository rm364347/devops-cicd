name: CI-CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-analyze-deploy:
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão aos scripts
        run: chmod +x ./scripts/*.sh || true

      - name: Build da aplicação
        run: mvn -B clean compile

      - name: Testes unitários
        run: mvn -B test

      - name: Testes de integração
        run: mvn -B -Dtest=*IntegrationTest verify

      - name: Testes funcionais
        run: mvn -B -Dtest=*FunctionalTest verify

      - name: Build do pacote
        run: mvn -B package -DskipTests

      - name: Subir aplicação para smoke test
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Aguardar aplicação iniciar
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              echo "Aplicação iniciada com sucesso."
              exit 0
            fi
            echo "Aguardando aplicação subir..."
            sleep 10
          done
          echo "Aplicação não subiu no tempo esperado."
          cat app.log
          exit 1

      - name: Smoke tests
        run: ./scripts/smoke-test.sh

      - name: Testes de performance
        uses: grafana/setup-k6-action@v1

      - name: Executar testes de performance
        run: k6 run tests/performance/performance-test.js

      - name: Análise SonarCloud
        if: env.SONAR_TOKEN != ''
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=rm364347_devops_cicd \
            -Dsonar.organization=rm364347-1

      - name: Build da imagem Docker
        run: docker build -t app-java-maven:latest .

      - name: Deploy local de validação
        if: github.ref == 'refs/heads/main'
        run: |
          docker rm -f app-java-maven || true
          docker run -d --name app-java-maven -p 8080:8080 app-java-maven:latest

      - name: Encerrar app iniciada para smoke test
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi

      - name: Publicar artefato JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - name: Publicar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            app.log
            target/surefire-reports/
            target/failsafe-reports/